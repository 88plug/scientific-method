site_name: Scientific Method
site_description: 'Falsification-first investigation and invention for Claude Code + Grok — hypothesis ledgers, controlled experiments, REFUTE-first verification for coding agents that need to be right.'
site_url: https://88plug.github.io/scientific-method/
repo_url: https://github.com/88plug/scientific-method
repo_name: 88plug/scientific-method
edit_uri: edit/main/docs/
use_directory_urls: true
strict: true

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - content.code.copy
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Home: index.md
  - Workflow: workflow.md
  - Agents: agents.md
  - Commands: commands.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - tables
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.details
  - toc:
      permalink: true
